<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - 虾弟掉线中 🦐</title>
    <style>
        body {
            background-color: #f4f7f9;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        .emoji {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: block;
        }
        h1 {
            color: #ff4d4f;
            margin: 0 0 1rem 0;
            font-size: 1.8rem;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .status-code {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
        .retry-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 24px;
            background-color: #1890ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .retry-btn:hover {
            background-color: #40a9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🦐</span>
        <h1>OpenClaw 暂时掉线了...</h1>
        <p>别担心，老板！虾弟可能正在后台“啃硬骨头”或者是网关重启中。请稍等片刻，然后尝试刷新页面。</p>
        <a href="javascript:location.reload();" class="retry-btn">点我刷新重连</a>
        <div class="status-code">
            系统提示：网关连接中断 (Error 502/504)
        </div>
    </div>
</body>
</html>
