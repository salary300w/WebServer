<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Hermes Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/x-icon" href="/hermes_icon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #252525;
    --bg-sidebar: #202020;
    --bg-card: #2a2a2a;
    --bg-card-hover: #333333;
    --bg-input: #2a2a2a;
    --border-color: #3a3a3a;
    --border-light: #333333;
    --accent-primary: #e0e0e0;
    --accent-hover: #f5f5f5;
    --accent-muted: #888888;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --text-muted: #888888;
    --success: #66bb6a;
    --error: #ef5350;
    --warning: #ffb74d;
    --msg-user-bg: #252525;
    --msg-assistant-bg: #252525;
    --msg-system-border: #555555;
    --code-bg: #1e1e1e;
    --text-on-accent: #1a1a1a;
    --text-on-overlay: #ffffff;
    --accent-info: #6ba3d6;
    --accent-primary-rgb: 224, 224, 224;
    --accent-hover-rgb: 245, 245, 245;
    --text-primary-rgb: 224, 224, 224;
    --text-muted-rgb: 136, 136, 136;
    --success-rgb: 102, 187, 106;
    --error-rgb: 239, 83, 80;
    --warning-rgb: 255, 183, 77;
    --accent-info-rgb: 107, 163, 214;
    --accent: #7170ff;
    --accent-hover: #828fff;
    --green: #27a644;
    --emerald: #10b981;
    --orange: #f59e0b;
    --red: #ef4444;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 8px;
    --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    --sidebar-width: 240px;
  }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    line-height: 1.5;
    font-feature-settings: 'cv01', 'ss03';
  }

  /* ── Chat panel ── */
  .chat-panel {
    display: flex;
    height: 100%;
    position: relative;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  /* ── Session list (sidebar) ── */
  .session-list {
    width: var(--sidebar-width);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--bg-sidebar);
    user-select: none;
  }

  .page-sidebar-top {
    flex-shrink: 0;
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
  }

  .page-sidebar-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    color: var(--text-primary);
    padding: 4px 2px;
  }

  .session-list-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .session-list-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 22px;
  }

  .session-list-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
    padding: 0;
  }
  .session-list-btn:hover {
    background: rgba(var(--accent-primary-rgb), 0.06);
  }

  .session-list-items {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .session-list-items::-webkit-scrollbar { width: 3px; }
  .session-list-items::-webkit-scrollbar-track { background: transparent; }
  .session-list-items::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  .session-list-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 6px 4px;
  }

  .session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: var(--font-sans);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .session-item:hover {
    background: rgba(var(--accent-primary-rgb), 0.06);
    color: var(--text-primary);
  }
  .session-item.active {
    color: var(--accent-primary);
    font-weight: 500;
  }

  .session-item-cb {
    display: none;
    width: 14px; height: 14px;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .session-item.manage .session-item-cb { display: block; }
  .session-item.manage { padding-left: 4px; gap: 6px; }

  .session-batch-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-top: 1px solid var(--border-color);
  }
  .session-batch-bar.show { display: flex; }
  .session-batch-count {
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
  }
  .session-batch-btn {
    all: unset; cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .session-batch-btn.del {
    color: var(--error);
    background: rgba(239,83,80,0.1);
  }
  .session-batch-btn.del:hover { background: rgba(239,83,80,0.2); }
  .session-batch-btn.done {
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-color);
  }
  .session-batch-btn.done:hover { background: rgba(255,255,255,0.08); }

  /* ── Chat content ── */
  .chat-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-primary);
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-primary);
    flex-shrink: 0;
    min-height: 52px;
  }
  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-header-name {
    font-size: 14px;
    font-weight: 500;
  }
  .chat-header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 22px;
  }
  .chat-header-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
  }
  .chat-header-btn:hover {
    background: rgba(var(--accent-primary-rgb), 0.06);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
    font-size: 14px;
  }
  .theme-toggle:hover {
    background: rgba(var(--accent-primary-rgb), 0.06);
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 85%;
    animation: fade-up 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.anya { align-self: flex-start; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .msg.anya .msg-avatar {
    background: linear-gradient(135deg, #7170ff, #a855f7);
  }
  .msg.user .msg-avatar {
    background: rgba(var(--accent-primary-rgb), 0.08);
    border: 1px solid var(--border-color);
  }

  .msg-body { min-width: 0; }
  .msg-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 3px;
  }
  .msg.user .msg-name { text-align: right; }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.anya .msg-bubble {
    background: var(--msg-assistant-bg);
    border: 1px solid var(--border-color);
  }
  .msg.user .msg-bubble {
    background: var(--msg-user-bg);
    border: 1px solid var(--border-color);
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 2px;
  }
  .msg.anya .msg-time { text-align: left; }
  .msg.user .msg-time { text-align: right; }

  .msg-bubble code {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .msg-bubble pre {
    background: var(--code-bg);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 6px 0;
    border: 1px solid var(--border-color);
  }
  .msg-bubble pre code { background: none; padding: 0; font-size: 12px; }
  .msg-bubble strong { font-weight: 600; }

  .welcome {
    text-align: center;
    padding: 80px 20px 40px;
    animation: fade-up 0.4s ease forwards;
  }
  .welcome-icon { font-size: 44px; margin-bottom: 14px; }
  .welcome h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .welcome p { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 360px; margin: 0 auto; }

  .typing {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 85%;
    align-self: flex-start;
    animation: fade-up 0.2s ease forwards;
  }
  .typing-avatar {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #7170ff, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .typing-card {
    padding: 11px 16px;
    background: var(--msg-assistant-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    display: flex; gap: 5px;
  }
  .typing-card span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: dot-bounce 1.2s infinite ease-in-out;
  }
  .typing-card span:nth-child(2) { animation-delay: 0.15s; }
  .typing-card span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input ── */
  .chat-input-area {
    position: relative;
    z-index: 80;
    padding: 8px 20px 14px;
    border-top: 0;
    background-color: var(--bg-card);
    flex-shrink: 0;
  }
  .dark .chat-input-area { background-color: #333333; }

  .input-wrapper {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    width: 100%;
    min-height: 150px;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent-primary); }

  .input-wrapper textarea {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 10px 14px 0;
    resize: none;
    line-height: 1.5;
    max-height: 100px;
    min-height: 38px;
  }
  .input-wrapper textarea::placeholder { color: var(--text-muted); }

  .input-toolbar {
    display: flex;
    align-items: center;
    padding: 0 4px 4px;
  }
  .input-top-bar {
    display: flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
    flex: 1;
    padding: 0;
  }
  .input-top-bar .spacer { flex: 1; }

  .input-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0 4px 0 6px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
    cursor: default;
    letter-spacing: -0.1px;
    height: 22px;
    transition: background 0.15s;
  }
  .input-tag:hover { background: rgba(255,255,255,0.04); }
  .input-tag-balance { color: var(--text-muted); }

  @media (max-width: 768px) {
    .session-list { display: none; }
    .chat-content { max-width: 100%; }
    .messages { padding: 12px 14px; }
    .msg { max-width: 95%; }
    .chat-input-area { padding: 8px 12px 12px; }
    .welcome { padding: 60px 16px 30px; }
  }
</style>
</head>
<body class="dark">

<div class="chat-panel">
  <!-- Session List -->
  <aside class="session-list">
    <div class="page-sidebar-top">
      <div class="page-sidebar-title">Hermes Agent</div>
      <div class="session-list-toolbar">
        <button class="session-list-btn" id="newChatBtn" title="新对话">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
        <div class="session-list-actions">
          <button class="session-list-btn" id="sessionManageBtn" title="管理">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="session-list-title">会话</div>
    <div class="session-list-items" id="sessionList"></div>

    <div class="session-batch-bar" id="sessionBatchBar">
      <span class="session-batch-count" id="sessionBatchCount">已选 0 项</span>
      <button class="session-batch-btn del" id="sessionBatchDel">删除</button>
      <button class="session-batch-btn done" id="sessionBatchDone">完成</button>
    </div>

    <div style="padding:8px 12px;border-top:1px solid var(--border-color);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:14px">🥜</span>
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--text-primary)">阿尼亚</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:1px">
          <span style="width:5px;height:5px;border-radius:50%;background:var(--success);display:inline-block"></span>
          <span style="font-size:10px;color:var(--text-muted)">在线</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Chat Content -->
  <main class="chat-content">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-name">阿尼亚 · 福杰</div>
      </div>
      <div class="chat-header-actions">
        <button class="theme-toggle" id="themeBtn" title="切换主题">🌙</button>
        <button class="chat-header-btn" id="clearBtn2" title="清空对话">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🥜</div>
        <h2>waku waku！</h2>
        <p>阿尼亚是知识分子！<br>为了世界和平……还有花生！</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="和阿尼亚说点什么..." enterkeyhint="send"></textarea>
        <div class="input-toolbar">
          <div class="input-top-bar">
            <span class="input-tag" id="inputModel">-</span>
            <span class="spacer"></span>
            <span class="input-tag input-tag-balance" id="inputBalance"></span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const clearBtn2 = document.getElementById('clearBtn2');
const newChatBtn = document.getElementById('newChatBtn');
const welcomeEl = document.getElementById('welcome');

let sessionToken = localStorage.getItem('anya_session') || '';
let isLoading = false;

// ── Message history (PgUp/PgDn) ──
let messageHistory = (function() {
  try { return JSON.parse(localStorage.getItem('anya_msg_history')) || []; } catch(e) { return []; }
})();
let historyIndex = -1;

function saveMessageHistory() {
  localStorage.setItem('anya_msg_history', JSON.stringify(messageHistory.slice(-50)));
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'PageUp' && inputEl.value === '') {
    e.preventDefault();
    if (messageHistory.length === 0) return;
    historyIndex = Math.max(0, historyIndex === -1 ? messageHistory.length - 1 : historyIndex - 1);
    inputEl.value = messageHistory[historyIndex];
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  } else if (e.key === 'PageDown' && inputEl.value === '') {
    e.preventDefault();
    if (historyIndex === -1) return;
    historyIndex++;
    if (historyIndex >= messageHistory.length) {
      historyIndex = -1;
      inputEl.value = '';
    } else {
      inputEl.value = messageHistory[historyIndex];
    }
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  } else if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault(); sendMessage();
  }
});

// ── Theme toggle ──
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.body.classList.toggle('dark', theme === 'dark');
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('hermes-theme', theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem('hermes-theme');
  if (saved === 'light' || saved === 'dark') { applyTheme(saved); return; }
  applyTheme('dark');
})();
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

// ── Session management ──
let currentSessionId = null;
const sessionListEl = document.getElementById('sessionList');
let isManageMode = false;
const manageBtn = document.getElementById('sessionManageBtn');
const batchBar = document.getElementById('sessionBatchBar');
const batchCount = document.getElementById('sessionBatchCount');
const batchDel = document.getElementById('sessionBatchDel');
const batchDone = document.getElementById('sessionBatchDone');

function getSessions() {
  try { return JSON.parse(localStorage.getItem('hermes_sessions')) || []; } catch(e) { return []; }
}
function saveSessions(sessions) {
  localStorage.setItem('hermes_sessions', JSON.stringify(sessions));
}
function getCurrentMessages() {
  const items = [];
  document.querySelectorAll('.msg').forEach(el => {
    items.push({
      role: el.classList.contains('anya') ? 'anya' : 'user',
      text: el.querySelector('.msg-bubble')?.textContent || ''
    });
  });
  return items;
}

function saveCurrentSession() {
  const msgs = getCurrentMessages();
  if (msgs.length === 0) return null;
  const sessions = getSessions();
  const firstMsg = msgs.find(m => m.role === 'user');
  const name = firstMsg ? firstMsg.text.slice(0, 30) + (firstMsg.text.length > 30 ? '…' : '') : '新对话';
  const id = Date.now().toString(36);
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const entry = { id, name, messages: msgs, createdAt: Date.now() };
  if (idx >= 0) { sessions[idx] = entry; } else { sessions.unshift(entry); }
  if (sessions.length > 20) sessions.length = 20;
  saveSessions(sessions);
  currentSessionId = id;
  renderSessionList();
  return id;
}

function loadSession(id) {
  const sessions = getSessions();
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  saveCurrentSession();
  document.querySelectorAll('.msg').forEach(el => el.remove());
  welcomeEl.style.display = 'none';
  session.messages.forEach(m => renderMessage(m.role, m.text, false));
  currentSessionId = id;
  localStorage.setItem('anya_messages', JSON.stringify(session.messages));
  scrollBottom();
  renderSessionList();
}

function deleteSession(id) {
  let sessions = getSessions();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  if (currentSessionId === id) {
    currentSessionId = null;
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    scrollBottom();
  }
  renderSessionList();
}

// Batch manage
function exitManageMode() {
  isManageMode = false;
  manageBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
  batchBar.classList.remove('show');
  renderSessionList();
}

function updateBatchCount() {
  const checked = sessionListEl.querySelectorAll('.session-item-cb:checked').length;
  batchCount.textContent = `已选 ${checked} 项`;
  return checked;
}

manageBtn.addEventListener('click', () => {
  if (isManageMode) { exitManageMode(); return; }
  isManageMode = true;
  manageBtn.textContent = '✕';
  batchBar.classList.add('show');
  updateBatchCount();
  renderSessionList();
});

batchDone.addEventListener('click', exitManageMode);

batchDel.addEventListener('click', () => {
  const checked = sessionListEl.querySelectorAll('.session-item-cb:checked');
  if (checked.length === 0) return;
  if (!confirm(`删除选中的 ${checked.length} 个会话？`)) return;
  const ids = new Set();
  checked.forEach(cb => ids.add(cb.dataset.id));
  let sessions = getSessions();
  const wasCurrent = ids.has(currentSessionId);
  sessions = sessions.filter(s => !ids.has(s.id));
  saveSessions(sessions);
  if (wasCurrent) {
    currentSessionId = null;
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    scrollBottom();
  }
  exitManageMode();
});

function renderSessionList() {
  const sessions = getSessions();
  if (sessions.length === 0) {
    sessionListEl.innerHTML = '<div style="padding:12px 6px;font-size:11px;color:var(--text-muted)">暂无历史会话</div>';
    return;
  }
  sessionListEl.innerHTML = sessions.map(s => `
    <div class="session-item${s.id === currentSessionId ? ' active' : ''}${isManageMode ? ' manage' : ''}" data-id="${s.id}">
      <input type="checkbox" class="session-item-cb" data-id="${s.id}">
      <span style="font-size:11px;opacity:0.5;flex-shrink:0">💬</span>
      ${s.name}
    </div>
  `).join('');
  sessionListEl.querySelectorAll('.session-item').forEach(el => {
    if (!isManageMode) {
      el.addEventListener('click', () => loadSession(el.dataset.id));
      el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if (confirm('删除此会话？')) deleteSession(el.dataset.id);
      });
    }
  });
  sessionListEl.querySelectorAll('.session-item-cb').forEach(cb => {
    cb.addEventListener('change', updateBatchCount);
  });
}

// ── Save history ──
function saveHistory() {
  const items = getCurrentMessages();
  localStorage.setItem('anya_messages', JSON.stringify(items));
  if (currentSessionId && items.length > 0) {
    const sessions = getSessions();
    const idx = sessions.findIndex(s => s.id === currentSessionId);
    if (idx >= 0) {
      const firstUser = items.find(m => m.role === 'user');
      sessions[idx].messages = items;
      sessions[idx].name = firstUser ? firstUser.text.slice(0, 30) + (firstUser.text.length > 30 ? '…' : '') : sessions[idx].name;
      saveSessions(sessions);
    }
  }
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

function loadHistory() {
  const saved = localStorage.getItem('anya_messages');
  if (!saved) return;
  try {
    const msgs = JSON.parse(saved);
    if (msgs.length === 0) return;
    welcomeEl.style.display = 'none';
    msgs.forEach(m => renderMessage(m.role, m.text, false));
    scrollBottom();
  } catch(e) {}
}

function renderMessage(role, text, animate = true) {
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) { div.style.animation = 'none'; div.style.opacity = '1'; div.style.transform = 'none'; }
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'anya' ? '🥜' : '👤';
  div.appendChild(avatar);
  const body = document.createElement('div');
  body.className = 'msg-body';
  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role === 'anya' ? '阿尼亚' : '爸爸';
  body.appendChild(name);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatMsg(text);
  body.appendChild(bubble);
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = time;
  body.appendChild(timeEl);
  div.appendChild(body);
  messagesEl.appendChild(div);
  if (welcomeEl.style.display !== 'none') welcomeEl.style.display = 'none';
  return div;
}

function formatMsg(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'typing-avatar'; avatar.textContent = '🥜';
  div.appendChild(avatar);
  const card = document.createElement('div');
  card.className = 'typing-card';
  card.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(card);
  messagesEl.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  messageHistory.push(text);
  historyIndex = -1;
  saveMessageHistory();
  inputEl.value = ''; inputEl.style.height = 'auto';
  renderMessage('user', text);
  saveHistory(); scrollBottom();
  isLoading = true; showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionToken }),
    });
    hideTyping();
    if (!res.ok) {
      renderMessage('anya', '唔…阿尼亚走神了，爸爸再说一遍好不好？🥜');
      saveHistory(); scrollBottom(); return;
    }
    const data = await res.json();
    sessionToken = data.sessionToken;
    localStorage.setItem('anya_session', sessionToken);
    renderMessage('anya', data.response);
    saveHistory(); scrollBottom();
  } catch (err) {
    hideTyping();
    renderMessage('anya', '啊！网络断了…阿尼亚连接不上了 🥲');
    saveHistory(); scrollBottom();
  } finally {
    isLoading = false;
  }
}

function clearAll() {
  saveCurrentSession();
  const msgs = document.querySelectorAll('.msg');
  if (msgs.length === 0) return;
  msgs.forEach(el => {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0'; el.style.transform = 'translateY(-8px)';
  });
  setTimeout(() => {
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    currentSessionId = null;
    renderSessionList();
    scrollBottom();
  }, 250);
}

document.getElementById('clearBtn2').addEventListener('click', clearAll);
newChatBtn.addEventListener('click', clearAll);

renderSessionList();
if (getCurrentMessages().length > 0) {
  const sessions = getSessions();
  if (sessions.length > 0) currentSessionId = sessions[0].id;
}

loadHistory();
scrollBottom();

// ── 获取模型和余额 ──
function updateFooterInfo() {
  fetch('/api/info')
    .then(r => r.json())
    .then(d => {
      let modelLabel = d.model || 'unknown';
      if (d.provider && d.provider !== 'unknown') modelLabel = d.provider + '/' + d.model;
      document.getElementById('inputModel').textContent = modelLabel;
      const balEl = document.getElementById('inputBalance');
      if (d.balance !== null && d.balance !== '--') {
        const sym = d.currency === 'CNY' ? '¥' : '$';
        balEl.textContent = sym + d.balance;
      } else {
        balEl.textContent = '';
      }
    })
    .catch(() => {});
}
updateFooterInfo();
setInterval(updateFooterInfo, 60000);
</script>
