<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Hermes Chat · 阿尼亚</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/x-icon" href="/hermes_icon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   Hermes Chat — Redesigned
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Core palette: warm dusk ── */
  --bg-deep:       #0e0e12;
  --bg-surface:    #16161d;
  --bg-elevated:   #1e1e28;
  --bg-hover:      #28283a;
  --border-subtle: rgba(255,255,255,0.06);
  --border-mid:    rgba(255,255,255,0.10);

  --text-primary:   #efeff1;
  --text-secondary: #adadb8;
  --text-muted:     #6b6b7a;

  --accent:        #a78bfa;
  --accent-soft:   rgba(167,139,250,0.12);
  --accent-glow:   rgba(167,139,250,0.25);
  --accent-gradient: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%);

  --user-gradient: linear-gradient(135deg, #2d2d44 0%, #232338 100%);
  --anya-gradient: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%);
  --green-dot:     #34d399;
  --orange:        #fbbf24;

  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --radius-xl:  24px;
  --radius-full: 9999px;

  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  --sidebar-w: 260px;
}

/* ── Light theme ── */
[data-theme="light"] {
  --bg-deep:       #f5f3ff;
  --bg-surface:    #ffffff;
  --bg-elevated:   #f0eefb;
  --bg-hover:      #e8e5f5;
  --border-subtle: rgba(0,0,0,0.06);
  --border-mid:    rgba(0,0,0,0.10);
  --text-primary:   #1c1b2e;
  --text-secondary: #5e5b77;
  --text-muted:     #9995af;
  --accent-soft:   rgba(167,139,250,0.10);
  --accent-glow:   rgba(167,139,250,0.15);
  --user-gradient: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  line-height: 1.6;
}

/* ═══════════════════════════════════════
   Layout
   ═══════════════════════════════════════ */
.app {
  display: flex;
  height: 100%;
  max-width: 100%;
}

/* ═══════════════════════════════════════
   Sidebar
   ═══════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  position: relative;
  z-index: 10;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  flex-shrink: 0;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  filter: drop-shadow(0 2px 8px var(--accent-glow));
}

.sidebar-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.sidebar-title span {
  color: var(--accent);
}

.sidebar-actions {
  display: flex;
  gap: 2px;
}

.sidebar-btn {
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  border: none; background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}
.sidebar-btn:hover {
  background: var(--accent-soft);
  color: var(--accent);
}

.sidebar-search {
  padding: 0 12px 12px;
  flex-shrink: 0;
}

.sidebar-search-input {
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search-input::placeholder { color: var(--text-muted); }
.sidebar-search-input:focus { border-color: var(--accent); }

.session-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 16px 6px;
  flex-shrink: 0;
}

.session-label-text {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.session-label-count {
  font-size: 10px;
  color: var(--text-muted);
  opacity: 0.6;
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.session-list::-webkit-scrollbar { width: 3px; }
.session-list::-webkit-scrollbar-track { background: transparent; }
.session-list::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

.session-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
  text-align: center;
}

.session-empty-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }

.session-empty-text {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font-sans);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  position: relative;
}
.session-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.session-item.active {
  background: var(--accent-soft);
  color: var(--text-primary);
  font-weight: 500;
}
.session-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 3px;
  background: var(--accent-gradient);
  border-radius: 0 3px 3px 0;
}

.session-item-icon {
  flex-shrink: 0;
  font-size: 14px;
  opacity: 0.6;
}

.session-item-cb {
  display: none;
  width: 15px; height: 15px;
  flex-shrink: 0;
  accent-color: var(--accent);
  cursor: pointer;
}
.session-item.manage .session-item-cb { display: block; }
.session-item.manage { padding-left: 6px; gap: 6px; }

/* Batch bar */
.batch-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.batch-bar.show { display: flex; }
.batch-count {
  font-size: 12px;
  color: var(--text-muted);
  flex: 1;
}
.batch-btn {
  all: unset; cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: var(--radius-full);
  transition: all 0.15s;
}
.batch-btn.del {
  color: #f87171;
  background: rgba(248,113,113,0.1);
}
.batch-btn.del:hover { background: rgba(248,113,113,0.2); }
.batch-btn.done {
  color: var(--text-muted);
  background: var(--bg-elevated);
}

/* Sidebar footer — user status */
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.sidebar-avatar {
  width: 34px; height: 34px;
  border-radius: var(--radius-full);
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  position: relative;
}
.sidebar-avatar-dot {
  position: absolute;
  bottom: 0; right: 0;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green-dot);
  border: 2px solid var(--bg-surface);
}

.sidebar-user-info { min-width: 0; }
.sidebar-user-name {
  font-size: 13px;
  font-weight: 600;
}
.sidebar-user-status {
  font-size: 11px;
  color: var(--text-muted);
  display: flex; align-items: center;
  gap: 5px;
  margin-top: 1px;
}

/* ═══════════════════════════════════════
   Main chat area
   ═══════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-deep);
  position: relative;
}

/* ── Chat header ── */
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  flex-shrink: 0;
  min-height: 56px;
}

.chat-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 6px var(--accent-glow));
}

.chat-header-name {
  font-size: 15px;
  font-weight: 600;
}

.chat-header-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.chat-header-actions {
  display: flex;
  align-items: center;
  gap: 2px;
}

.chat-header-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border: none; background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
  font-size: 15px;
}
.chat-header-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

.msg {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  max-width: 80%;
  animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
  transform: translateY(10px) scale(0.98);
}
@keyframes msgIn { to { opacity: 1; transform: translateY(0) scale(1); } }

.msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  position: relative;
  transition: transform 0.2s;
}
.msg-avatar:hover { transform: scale(1.1); }

.msg.anya .msg-avatar {
  background: var(--accent-gradient);
}

.msg.user .msg-avatar {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
}

.msg-body { min-width: 0; }

.msg-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  padding: 0 4px;
}

.msg-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}

.msg-time-meta {
  font-size: 10px;
  color: var(--text-muted);
  opacity: 0.6;
}

.msg.user .msg-meta { justify-content: flex-end; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
  position: relative;
}

.msg.anya .msg-bubble {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: var(--user-gradient);
  border: 1px solid var(--border-subtle);
  border-bottom-right-radius: 4px;
}

.msg-bubble code {
  background: rgba(255,255,255,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: var(--font-mono);
}

.msg-bubble pre {
  background: var(--bg-deep);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid var(--border-subtle);
}
.msg-bubble pre code { background: none; padding: 0; font-size: 13px; }
.msg-bubble strong { font-weight: 600; }

/* ── Welcome ── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  animation: msgIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.welcome-icon {
  width: 72px; height: 72px;
  border-radius: var(--radius-xl);
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin-bottom: 20px;
  filter: drop-shadow(0 4px 20px var(--accent-glow));
}

.welcome h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.welcome p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 340px;
}

.welcome-tips {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.welcome-tip {
  padding: 6px 14px;
  border-radius: var(--radius-full);
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}
.welcome-tip:hover {
  background: transparent;
  border-color: var(--accent-glow);
}

/* ── Inline typing dots (inside bubble while streaming) ── */
@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.2; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.typing-dots {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
}
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: dotBounce 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

/* ── Input area ── */
.input-area {
  padding: 12px 24px 20px;
  flex-shrink: 0;
  background: linear-gradient(to top, var(--bg-deep) 60%, transparent);
  position: relative;
  z-index: 5;
}

.input-box {
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 4px 4px 4px 16px;
}

.input-row textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  padding: 8px 0;
  resize: none;
  line-height: 1.5;
  max-height: 120px;
  min-height: 24px;
}
.input-row textarea::placeholder { color: var(--text-muted); }

.input-send {
  width: 36px; height: 36px;
  flex-shrink: 0;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent-gradient);
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  opacity: 0.5;
}
.input-send.active {
  opacity: 1;
  cursor: pointer;
}
.input-send.active:hover {
  filter: brightness(1.15);
  transform: scale(1.05);
}

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 12px 6px 16px;
  border-top: 1px solid var(--border-subtle);
  margin-top: 2px;
}

.input-status {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Capsule tags ── */
.capsule {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px 3px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-family: var(--font-mono);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  transition: all 0.2s;
  cursor: default;
  user-select: none;
  white-space: nowrap;
}

.capsule:hover {
  background: var(--bg-hover);
  border-color: var(--border-mid);
}

.capsule-icon {
  flex-shrink: 0;
  font-size: 11px;
  opacity: 0.7;
}

.capsule-model {
  letter-spacing: -0.2px;
}

.capsule-balance {
  color: var(--accent);
  font-weight: 500;
}

.capsule-balance.low {
  color: #f87171;
}

#balanceCapsule .refresh-hint {
  opacity: 0;
  margin-left: 2px;
  transition: opacity 0.2s, transform 0.2s;
  display: inline-block;
}
#balanceCapsule:hover .refresh-hint {
  opacity: 0.5;
}
#balanceCapsule .refresh-hint.spin {
  opacity: 0.7;
  animation: spin 0.6s linear infinite;
}

/* ── Model switcher popover ── */
.model-popover {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0;
  min-width: 200px;
  background: var(--bg-surface);
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-md);
  padding: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 100;
}
.model-popover.show { display: block; }

.model-popover-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 8px 6px;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 4px;
}

.model-popover-refresh {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 2px;
  border-radius: 3px;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.model-popover-refresh:hover {
  color: var(--accent);
  background: var(--accent-soft);
}
.model-popover-refresh.spin {
  animation: spin 0.6s linear infinite;
  color: var(--accent);
}

.model-option {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  text-align: left;
  font-weight: 400;
}
.model-option:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.model-option.active {
  color: var(--accent);
  font-weight: 500;
}
.model-option-check {
  width: 14px;
  flex-shrink: 0;
  color: var(--accent);
  font-size: 11px;
}
.model-option-name {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 11px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.input-hint {
  font-size: 11px;
  color: var(--text-muted);
  opacity: 0.4;
  letter-spacing: -0.1px;
}

/* ═══════════════════════════════════════
   Responsive
   ═══════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .messages { padding: 12px 14px; }
  .msg { max-width: 92%; }
  .input-area { padding: 8px 12px 16px; }
  .welcome { padding: 40px 16px; }
  .welcome-tips { flex-direction: column; align-items: stretch; }
  .chat-header { padding: 10px 14px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">🥜</div>
        <div class="sidebar-title">Hermes <span>Chat</span></div>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-btn" id="newChatBtn" title="新对话">✚</button>
        <button class="sidebar-btn" id="sessionManageBtn" title="管理对话">☰</button>
      </div>
    </div>

    <div class="sidebar-search">
      <input class="sidebar-search-input" id="sessionSearch" type="text" placeholder="搜索对话…" spellcheck="false">
    </div>

    <div class="session-label">
      <span class="session-label-text">对话历史</span>
      <span class="session-label-count" id="sessionCount">0</span>
    </div>

    <div class="session-list" id="sessionList">
      <div class="session-empty" id="sessionEmpty">
        <div class="session-empty-icon">💭</div>
        <div class="session-empty-text">还没有对话记录<br>开始一段新的聊天吧</div>
      </div>
    </div>

    <!-- Batch bar -->
    <div class="batch-bar" id="sessionBatchBar">
      <span class="batch-count" id="sessionBatchCount">已选 0 项</span>
      <button class="batch-btn del" id="sessionBatchDel">删除</button>
      <button class="batch-btn done" id="sessionBatchDone">完成</button>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-avatar">
        🥜
        <span class="sidebar-avatar-dot"></span>
      </div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">阿尼亚</div>
        <div class="sidebar-user-status">
          <span style="width:5px;height:5px;border-radius:50%;background:var(--green-dot);display:inline-block"></span>
          在线 · 随时待命
        </div>
      </div>
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <main class="main">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-avatar">🥜</div>
        <div>
          <div class="chat-header-name">阿尼亚 · 福杰</div>
          <div class="chat-header-sub">waku waku！今天也想和爸爸聊天</div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="chat-header-btn" id="themeBtn" title="切换主题">🌙</button>
        <button class="chat-header-btn" id="clearBtn2" title="清空对话">🗑</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🥜</div>
        <h2>waku waku！</h2>
        <p>阿尼亚是知识分子！<br>为了世界和平……还有花生！</p>
        <div class="welcome-tips">
          <div class="welcome-tip" data-prompt="给我讲个有趣的故事">📖 讲故事</div>
          <div class="welcome-tip" data-prompt="用简单的方式解释量子力学">🔬 科普一下</div>
          <div class="welcome-tip" data-prompt="帮我写一首关于花生的诗">🥜 写首诗</div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-box">
        <div class="input-row">
          <textarea id="input" rows="1" placeholder="和阿尼亚说点什么..." enterkeyhint="send"></textarea>
          <button class="input-send" id="sendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <div class="input-status">
            <span class="capsule" id="modelCapsule" style="position:relative;cursor:pointer" title="点击切换模型">
              <span class="capsule-icon">🤖</span>
              <span class="capsule-model" id="inputModel">—</span>
              <span style="font-size:9px;opacity:0.4;margin-left:2px">▾</span>
              <div class="model-popover" id="modelPopover">
                <div class="model-popover-header">
                  <span>可选模型</span>
                  <button class="model-popover-refresh" id="modelRefreshBtn" title="从官方接口刷新模型列表">↻</button>
                </div>
                <div id="modelList"></div>
              </div>
            </span>
            <span class="capsule" id="balanceCapsule" title="账户余额 · 点击刷新">
              <span class="capsule-icon">💰</span>
              <span class="capsule-balance" id="inputBalance"></span>
              <span class="refresh-hint">↻</span>
            </span>
          </div>
          <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const clearBtn2 = document.getElementById('clearBtn2');
const newChatBtn = document.getElementById('newChatBtn');
const welcomeEl = document.getElementById('welcome');
const sessionListEl = document.getElementById('sessionList');
const sessionEmptyEl = document.getElementById('sessionEmpty');

let sessionToken = localStorage.getItem('anya_session') || '';
let isLoading = false;
let currentSessionId = localStorage.getItem('hermes_current_session') || null;
function setCurrentSessionId(id) {
  currentSessionId = id;
  if (id) localStorage.setItem('hermes_current_session', id);
  else localStorage.removeItem('hermes_current_session');
}
let isManageMode = false;

// ── Message history (PgUp/PgDn) ──
let messageHistory = (function() {
  try { return JSON.parse(localStorage.getItem('anya_msg_history')) || []; } catch(e) { return []; }
})();
let historyIndex = -1;

function saveMessageHistory() {
  localStorage.setItem('anya_msg_history', JSON.stringify(messageHistory.slice(-50)));
}

// ═══════════════════════════════════════════════
//  Theme
// ═══════════════════════════════════════════════
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('hermes-theme', theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem('hermes-theme');
  applyTheme(saved === 'light' || saved === 'dark' ? saved : 'dark');
})();
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

// ═══════════════════════════════════════════════
//  Sessions
// ═══════════════════════════════════════════════
function getSessions() {
  try { return JSON.parse(localStorage.getItem('hermes_sessions')) || []; } catch(e) { return []; }
}
function saveSessions(sessions) {
  localStorage.setItem('hermes_sessions', JSON.stringify(sessions));
}

function getCurrentMessages() {
  return [...document.querySelectorAll('.msg')].map(el => {
    const bubble = el.querySelector('.msg-bubble');
    if (!bubble) return null;
    const raw = bubble.dataset.raw;
    // data.raw === '' 表示尚在加载中的 AI 气泡，跳过
    if (raw === '') return null;
    const text = raw || bubble.textContent;
    return { role: el.classList.contains('anya') ? 'anya' : 'user', text };
  }).filter(Boolean);
}

function saveCurrentSession() {
  const msgs = getCurrentMessages();
  if (msgs.length === 0) return null;
  const sessions = getSessions();
  const firstMsg = msgs.find(m => m.role === 'user');
  const name = firstMsg ? firstMsg.text.slice(0, 30) + (firstMsg.text.length > 30 ? '…' : '') : '新对话';
  const id = currentSessionId || Date.now().toString(36);
  const idx = sessions.findIndex(s => s.id === id);
  const entry = { id, name, messages: msgs, createdAt: Date.now() };
  if (idx >= 0) { sessions[idx] = entry; } else { sessions.unshift(entry); }
  if (sessions.length > 20) sessions.length = 20;
  saveSessions(sessions);
  setCurrentSessionId(id);
  renderSessionList();
  return id;
}

function loadSession(id) {
  const sessions = getSessions();
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  saveCurrentSession();
  document.querySelectorAll('.msg').forEach(el => el.remove());
  welcomeEl.style.display = 'none';
  session.messages.forEach(m => renderMessage(m.role, m.text, false));
  setCurrentSessionId(id);
  localStorage.setItem('anya_messages', JSON.stringify(session.messages));
  scrollBottom();
  renderSessionList();
}

function deleteSession(id) {
  let sessions = getSessions();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  if (currentSessionId === id) {
    setCurrentSessionId(null);
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    scrollBottom();
  }
  renderSessionList();
}

// ═══════════════════════════════════════════════
//  Batch manage
// ═══════════════════════════════════════════════
const manageBtn = document.getElementById('sessionManageBtn');
const batchBar = document.getElementById('sessionBatchBar');
const batchCount = document.getElementById('sessionBatchCount');
const batchDel = document.getElementById('sessionBatchDel');
const batchDone = document.getElementById('sessionBatchDone');

function exitManageMode() {
  isManageMode = false;
  manageBtn.textContent = '☰';
  batchBar.classList.remove('show');
  renderSessionList();
}

function updateBatchCount() {
  const checked = sessionListEl.querySelectorAll('.session-item-cb:checked').length;
  batchCount.textContent = `已选 ${checked} 项`;
  return checked;
}

manageBtn.addEventListener('click', () => {
  if (isManageMode) { exitManageMode(); return; }
  isManageMode = true;
  manageBtn.textContent = '✕';
  batchBar.classList.add('show');
  updateBatchCount();
  renderSessionList();
});

batchDone.addEventListener('click', exitManageMode);

batchDel.addEventListener('click', () => {
  const checked = sessionListEl.querySelectorAll('.session-item-cb:checked');
  if (checked.length === 0) return;
  if (!confirm(`删除选中的 ${checked.length} 个会话？`)) return;
  const ids = new Set();
  checked.forEach(cb => ids.add(cb.dataset.id));
  let sessions = getSessions();
  const wasCurrent = ids.has(currentSessionId);
  sessions = sessions.filter(s => !ids.has(s.id));
  saveSessions(sessions);
  if (wasCurrent) {
    setCurrentSessionId(null);
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    scrollBottom();
  }
  exitManageMode();
});

// ═══════════════════════════════════════════════
//  Render session list
// ═══════════════════════════════════════════════
function renderSessionList() {
  const sessions = getSessions();
  const countEl = document.getElementById('sessionCount');
  countEl.textContent = sessions.length;

  if (sessions.length === 0) {
    sessionListEl.innerHTML = `
      <div class="session-empty">
        <div class="session-empty-icon">💭</div>
        <div class="session-empty-text">还没有对话记录</div>
      </div>`;
    return;
  }

  sessionListEl.innerHTML = sessions.map(s => `
    <div class="session-item${s.id === currentSessionId ? ' active' : ''}${isManageMode ? ' manage' : ''}" data-id="${s.id}">
      <input type="checkbox" class="session-item-cb" data-id="${s.id}">
      <span class="session-item-icon">💬</span>
      ${s.name}
    </div>
  `).join('');

  sessionListEl.querySelectorAll('.session-item').forEach(el => {
    if (!isManageMode) {
      el.addEventListener('click', () => loadSession(el.dataset.id));
      el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if (confirm('删除此会话？')) deleteSession(el.dataset.id);
      });
    }
  });
  sessionListEl.querySelectorAll('.session-item-cb').forEach(cb => {
    cb.addEventListener('change', updateBatchCount);
  });
}

// ── Search ──
document.getElementById('sessionSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  sessionListEl.querySelectorAll('.session-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ═══════════════════════════════════════════════
//  Messages
// ═══════════════════════════════════════════════
function renderMessage(role, text, animate = true) {
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) { div.style.animation = 'none'; div.style.opacity = '1'; div.style.transform = 'none'; }
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'anya' ? '🥜' : '👤';
  div.appendChild(avatar);
  const body = document.createElement('div');
  body.className = 'msg-body';
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const name = document.createElement('span');
  name.className = 'msg-name';
  name.textContent = role === 'anya' ? '阿尼亚' : '爸爸';
  meta.appendChild(name);
  const timeMeta = document.createElement('span');
  timeMeta.className = 'msg-time-meta';
  timeMeta.textContent = time;
  meta.appendChild(timeMeta);
  body.appendChild(meta);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.dataset.raw = text;
  bubble.innerHTML = formatMsg(text);
  body.appendChild(bubble);
  div.appendChild(body);
  messagesEl.appendChild(div);
  if (welcomeEl.style.display !== 'none') welcomeEl.style.display = 'none';
  return div;
}

function formatMsg(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function scrollBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

// ═══════════════════════════════════════════════
//  Send message (Hermes CLI)
// ═══════════════════════════════════════════════
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  messageHistory.push(text);
  historyIndex = -1;
  saveMessageHistory();
  inputEl.value = ''; inputEl.style.height = 'auto';
  updateSendBtn();
  renderMessage('user', text);
  scrollBottom();
  saveHistory();
  isLoading = true;
  const sessionIdAtSend = currentSessionId;
  const aiMsgEl = renderMessage('anya', '', false);
  const bubble = aiMsgEl.querySelector('.msg-bubble');
  bubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
  scrollBottom();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionToken }),
    });
    if (!res.ok) {
      bubble.dataset.raw = '唔…阿尼亚走神了，爸爸再说一遍好不好？🥜';
      bubble.innerHTML = formatMsg('唔…阿尼亚走神了，爸爸再说一遍好不好？🥜');
      saveHistory(); scrollBottom(); return;
    }
    const data = await res.json();
    sessionToken = data.sessionToken;
    localStorage.setItem('anya_session', sessionToken);

    if (document.contains(bubble)) {
      // 用户仍在同一对话，正常渲染
      bubble.dataset.raw = data.response;
      bubble.innerHTML = formatMsg(data.response);
      saveHistory();
    } else {
      // 用户已切换到其他对话，把回复存到原始会话中
      const sessions = getSessions();
      const idx = sessions.findIndex(s => s.id === sessionIdAtSend);
      if (idx >= 0) {
        sessions[idx].messages.push({ role: 'anya', text: data.response });
        // 收到回复，移到最前面
        const entry = sessions.splice(idx, 1)[0];
        sessions.unshift(entry);
        saveSessions(sessions);
        renderSessionList();
      }
    }
    scrollBottom();
  } catch (err) {
    bubble.dataset.raw = '啊！网络断了…阿尼亚连接不上了 🥲';
    bubble.innerHTML = formatMsg('啊！网络断了…阿尼亚连接不上了 🥲');
    saveHistory(); scrollBottom();
  } finally {
    isLoading = false;
  }
}

function saveHistory() {
  const items = getCurrentMessages();
  localStorage.setItem('anya_messages', JSON.stringify(items));
  if (!items.length) return;
  if (currentSessionId) {
    const sessions = getSessions();
    const idx = sessions.findIndex(s => s.id === currentSessionId);
    if (idx >= 0) {
      const firstUser = items.find(m => m.role === 'user');
      sessions[idx].messages = items;
      sessions[idx].name = firstUser ? firstUser.text.slice(0, 30) + (firstUser.text.length > 30 ? '…' : '') : sessions[idx].name;
      // 该会话有新的活动，移到最前面
      const entry = sessions.splice(idx, 1)[0];
      sessions.unshift(entry);
      saveSessions(sessions);
      renderSessionList();
    } else {
      // 会话已被删除，创建新会话
      saveCurrentSession();
    }
  } else {
    // 首次消息，创建会话条目
    saveCurrentSession();
  }
}

function loadHistory() {
  const saved = localStorage.getItem('anya_messages');
  if (!saved) return;
  try {
    const msgs = JSON.parse(saved);
    if (msgs.length === 0) return;
    welcomeEl.style.display = 'none';
    msgs.forEach(m => renderMessage(m.role, m.text, false));
    scrollBottom();
  } catch(e) {}
}

function clearAll() {
  saveCurrentSession();
  const msgs = document.querySelectorAll('.msg');
  if (msgs.length === 0) return;
  msgs.forEach(el => {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0'; el.style.transform = 'translateY(-8px)';
  });
  setTimeout(() => {
    document.querySelectorAll('.msg').forEach(el => el.remove());
    welcomeEl.style.display = '';
    localStorage.removeItem('anya_messages');
    localStorage.removeItem('anya_session');
    sessionToken = '';
    setCurrentSessionId(null);
    renderSessionList();
    scrollBottom();
  }, 250);
}

// ═══════════════════════════════════════════════
//  Input handling
// ═══════════════════════════════════════════════
function updateSendBtn() {
  sendBtn.classList.toggle('active', inputEl.value.trim().length > 0);
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  updateSendBtn();
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault(); sendMessage();
  } else if (e.key === 'PageUp' && inputEl.value === '') {
    e.preventDefault();
    if (messageHistory.length === 0) return;
    historyIndex = Math.max(0, historyIndex === -1 ? messageHistory.length - 1 : historyIndex - 1);
    inputEl.value = messageHistory[historyIndex];
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateSendBtn();
  } else if (e.key === 'PageDown' && inputEl.value === '') {
    e.preventDefault();
    if (historyIndex === -1) return;
    historyIndex++;
    if (historyIndex >= messageHistory.length) {
      historyIndex = -1;
      inputEl.value = '';
    } else {
      inputEl.value = messageHistory[historyIndex];
    }
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateSendBtn();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ═══════════════════════════════════════════════
//  Welcome tips
// ═══════════════════════════════════════════════
document.querySelectorAll('.welcome-tip').forEach(el => {
  el.addEventListener('click', () => {
    inputEl.value = el.dataset.prompt;
    updateSendBtn();
    inputEl.focus();
  });
});

// ═══════════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════════
clearBtn2.addEventListener('click', clearAll);
newChatBtn.addEventListener('click', clearAll);

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
renderSessionList();
loadHistory();
scrollBottom();

// 验证 currentSessionId 仍有效，否则回退到最新会话
if (getCurrentMessages().length > 0) {
  const sessions = getSessions();
  if (sessions.length > 0 && !sessions.some(s => s.id === currentSessionId)) {
    setCurrentSessionId(sessions[0].id);
  }
}

updateSendBtn();

// ═══════════════════════════════════════════════
//  Model & balance info
// ═══════════════════════════════════════════════
function updateFooterInfo() {
  return fetch('/api/info')
    .then(r => r.json())
    .then(d => {
      let modelLabel = d.model || 'unknown';
      if (d.provider && d.provider !== 'unknown') modelLabel = d.provider + '/' + d.model;
      document.getElementById('inputModel').textContent = modelLabel;
      const balEl = document.getElementById('inputBalance');
      if (d.balance !== null && d.balance !== '--') {
        const sym = d.currency === 'CNY' ? '¥' : '$';
        const formatted = sym + Number(d.balance).toFixed(2);
        balEl.textContent = formatted;
        // Low balance warning (< 1 currency unit)
        balEl.classList.toggle('low', d.balance < 1);
      } else {
        balEl.textContent = '—';
        balEl.classList.remove('low');
      }
    })
    .catch(() => {});
}
updateFooterInfo();
setInterval(updateFooterInfo, 60000);

// Click balance capsule to refresh
let isRefreshing = false;
document.getElementById('balanceCapsule').addEventListener('click', () => {
  if (isRefreshing) return;
  isRefreshing = true;
  const balEl = document.getElementById('inputBalance');
  const hintEl = balEl.nextElementSibling;
  balEl.textContent = '⋯';
  balEl.classList.remove('low');
  if (hintEl) hintEl.classList.add('spin');
  const MIN_HOLD = new Promise(r => setTimeout(r, 300));
  Promise.all([updateFooterInfo(), MIN_HOLD]).finally(() => {
    if (hintEl) hintEl.classList.remove('spin');
    isRefreshing = false;
  });
});

// ═══════════════════════════════════════════════
//  Model switcher
// ═══════════════════════════════════════════════
const modelCapsule = document.getElementById('modelCapsule');
const modelPopover = document.getElementById('modelPopover');
const modelList = document.getElementById('modelList');
let currentModel = '—';
let isSwitching = false;

function fetchModels() {
  return fetch('/api/models')
    .then(r => r.json())
    .then(d => {
      currentModel = d.current;
      renderModelList(d.models, d.current);
      return d;
    })
    .catch(() => {});
}

function renderModelList(models, active) {
  if (!models || models.length === 0) {
    modelList.innerHTML = '<div style="padding:12px;text-align:center;font-size:11px;color:var(--text-muted)">暂无可选模型</div>';
    return;
  }
  modelList.innerHTML = models.map(m => {
    const isActive = m === active;
    return `<button class="model-option${isActive ? ' active' : ''}" data-model="${m}">
      <span class="model-option-check">${isActive ? '✓' : ''}</span>
      <span class="model-option-name">${m}</span>
    </button>`;
  }).join('');

  modelList.querySelectorAll('.model-option').forEach(el => {
    el.addEventListener('click', async () => {
      if (isSwitching) return;
      const model = el.dataset.model;
      if (model === currentModel) { hidePopover(); return; }
      isSwitching = true;
      const MIN_HOLD = new Promise(r => setTimeout(r, 300));
      try {
        const [res] = await Promise.all([
          fetch('/api/models/switch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model }),
          }),
          MIN_HOLD,
        ]);
        if (!res || !res.ok) throw new Error();
        currentModel = model;
        hidePopover();
        updateFooterInfo();
        fetchModels();
      } catch (e) {
        hidePopover();
        alert('切换模型失败，请稍后再试');
      } finally {
        isSwitching = false;
      }
    });
  });
}

function showPopover() {
  modelPopover.classList.add('show');
  fetchModels();
}

function hidePopover() {
  modelPopover.classList.remove('show');
}

modelCapsule.addEventListener('click', (e) => {
  e.stopPropagation();
  if (modelPopover.classList.contains('show')) {
    hidePopover();
  } else {
    showPopover();
  }
});

document.addEventListener('click', (e) => {
  if (!modelCapsule.contains(e.target)) hidePopover();
});

// Refresh model list from live API
document.getElementById('modelRefreshBtn').addEventListener('click', async (e) => {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.classList.add('spin');
  try {
    const res = await fetch('/api/models/refresh', { method: 'POST' });
    const d = await res.json();
    currentModel = d.current;
    // Also update the model display
    document.getElementById('inputModel').textContent = d.current;
    renderModelList(d.models, d.current);
  } catch (err) {
    // silently fail, list stays as-is
  } finally {
    btn.classList.remove('spin');
  }
});

// Init: fetch models on load
fetchModels();
</script>
</body>
</html>
