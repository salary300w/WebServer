server {
    listen       8080 ssl;
    listen  [::]:8080 ssl;
    server_name  localhost;

    ssl_certificate /etc/nginx/ssl/openclaw.crt;
    ssl_certificate_key /etc/nginx/ssl/openclaw.key;

    # 1. 核心防御：专门拦截对 index.html 的访问
    location = /index.html {
        root   /usr/share/nginx/html;

        # 验证通过，发送文件并禁止缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # 2. 通用配置：处理 login.html 和其他资源
    location / {
        root   /usr/share/nginx/html;
        # 重点：index 顺序要把 login.html 放在最前面，防止默认进 index.html 被拦截
        index  login.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        internal;
    }
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  HomeworkManagement.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        internal;
    }
}

server {
    listen 82 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/openclaw.crt;
    ssl_certificate_key /etc/nginx/ssl/openclaw.key;

    client_max_body_size 50M;

    location / {
        proxy_pass http://host.docker.internal:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    error_page   500 502 503 504  /openclaw_error.html;
    location = /openclaw_error.html {
        root   /usr/share/nginx/html;
        internal;
    }
}