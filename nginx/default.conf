server {
    listen       8080 ssl;
    listen  [::]:8080 ssl;
    server_name  localhost;

    ssl_certificate /etc/nginx/ssl/atm.crt;
    ssl_certificate_key /etc/nginx/ssl/atm.key;

    # 1. Hermes Guard - 内部验证接口
    location = /hermes-guard/verify {
        internal;
        proxy_pass http://guard:3000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # 2. Hermes Guard - UI 入口
    location /hermes-guard/ {
        proxy_pass http://guard:3000/;
        proxy_set_header Host $host;
    }

    # 屏蔽监控页（属于端口 82，不在 8080 暴露）
    location = /sys_status.html {
        return 404;
    }

    # 3. 核心网页入口
    location / {
        auth_request /hermes-guard/verify;
        error_page 401 = @guard_error;

        root   /usr/share/nginx/html;
        index  index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # 4. 验证失败重定向逻辑
    location @guard_error {
        return 302 /hermes-guard/login.html;
    }

    # 股票历史数据专属错误页
    error_page   500 502 503 504  /stock_error.html;
    location = /stock_error.html {
        root   /usr/share/nginx/error-pages;
        internal;
    }
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/homework;
        index  index.html;
        
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # 作业管理系统专属错误页
    error_page   500 502 503 504  /homework_error.html;
    location = /homework_error.html {
        root   /usr/share/nginx/error-pages;
        internal;
    }
}

server {
    listen       81 ssl;
    listen  [::]:81 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/atm.crt;
    ssl_certificate_key /etc/nginx/ssl/atm.key;

    location / {
        root   /usr/share/nginx/hermes-dashboard;
        index  index.html;
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # 系统状态 API — 转发到 Hermes Guard
    location /hermes-guard/api/ {
        proxy_pass http://guard:3000/api/;
        proxy_set_header Host $host;
    }

}

server {
    listen       83 ssl;
    listen  [::]:83 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/atm.crt;
    ssl_certificate_key /etc/nginx/ssl/atm.key;

    # Serve static assets for error pages
    location ~* \.(png|ico|jpg|jpeg|gif|svg)$ {
        root /usr/share/nginx/error-pages;
    }

    client_max_body_size 0;

    location / {
        proxy_pass http://host.docker.internal:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # codeserver 专属错误页
    error_page   500 502 503 504  /code_error.html;
    location = /code_error.html {
        root   /usr/share/nginx/error-pages;
        internal;
    }
}

