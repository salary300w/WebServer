server {
    listen       8080 ssl;
    listen  [::]:8080 ssl;
    server_name  localhost;

    ssl_certificate /etc/nginx/ssl/openclaw.crt;
    ssl_certificate_key /etc/nginx/ssl/openclaw.key;

    # 1. 虾卫士 - 内部验证接口
    location = /shrimp-guard/verify {
        internal;
        # 统一使用 compose 服务名，不再锁定 IP
        proxy_pass http://guard:3000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # 2. 虾卫士 - UI 入口
    location /shrimp-guard/ {
        proxy_pass http://guard:3000/;
        proxy_set_header Host $host;
    }

    # 3. 核心网页入口
    location / {
        auth_request /shrimp-guard/verify;
        error_page 401 = @shrimp_error;

        root   /usr/share/nginx/html;
        index  index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # 4. 验证失败重定向逻辑
    location @shrimp_error {
        return 302 /shrimp-guard/login.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        internal;
    }
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  HomeworkManagement.html;
        
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        internal;
    }
}

server {
    listen 82 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/openclaw.crt;
    ssl_certificate_key /etc/nginx/ssl/openclaw.key;

    client_max_body_size 50M;

    location / {
        proxy_pass http://host.docker.internal:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    error_page   500 502 503 504  /openclaw_error.html;
    location = /openclaw_error.html {
        root   /usr/share/nginx/html;
        internal;
    }
}
