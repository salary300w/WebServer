<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextChat — 连接中断</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 70% 20%, rgba(16,185,129,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
        }
        /* 模拟聊天气泡浮动 */
        .bubble {
            position: fixed;
            border-radius: 18px;
            opacity: 0.04;
            animation: float-up linear infinite;
        }
        .bubble-1 { width: 180px; height: 44px; background: #10b981; bottom: -60px; left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .bubble-2 { width: 120px; height: 36px; background: #06b6d4; bottom: -60px; left: 35%; animation-duration: 15s; animation-delay: -5s; }
        .bubble-3 { width: 200px; height: 44px; background: #10b981; bottom: -60px; right: 15%; animation-duration: 10s; animation-delay: -8s; }
        .bubble-4 { width: 90px; height: 32px; background: #06b6d4; bottom: -60px; left: 60%; animation-duration: 18s; animation-delay: -3s; }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0.04; }
            80% { opacity: 0.04; }
            100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
        }
        .card {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 90%;
        }
        /* 模拟聊天界面 */
        .chat-window {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .chat-header {
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .chat-title { font-weight: 600; font-size: 0.95rem; }
        .chat-subtitle { font-size: 0.72rem; color: #6e7681; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ef4444;
            margin-left: auto;
            box-shadow: 0 0 8px #ef4444;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .chat-body {
            padding: 24px 20px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        /* 模拟用户消息 */
        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .msg.user { flex-direction: row-reverse; }
        .msg-bubble {
            max-width: 240px;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .msg.ai .msg-bubble {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-bottom-left-radius: 4px;
        }
        .msg.user .msg-bubble {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        /* 打字动画 */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 14px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #ef4444;
            animation: typing-dot 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-dot {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .error-msg {
            font-size: 0.78rem;
            color: #f87171;
            font-style: italic;
        }
        .chat-footer {
            border-top: 1px solid #21262d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d1117;
        }
        .input-mock {
            flex: 1;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.82rem;
            color: #6e7681;
            font-family: inherit;
        }
        .send-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: #21262d;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e7681;
            font-size: 1rem;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding: 0 4px;
        }
        .info-text { font-size: 0.72rem; color: #6e7681; }
        .back-link {
            font-size: 0.72rem;
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
    <div class="bubble bubble-4"></div>
    <div class="card">
        <div class="chat-window">
            <div class="chat-header">
                <div class="avatar">💬</div>
                <div>
                    <div class="chat-title">NextChat</div>
                    <div class="chat-subtitle">GPT · Claude · Gemini</div>
                </div>
                <div class="status-dot"></div>
            </div>
            <div class="chat-body">
                <div class="msg user">
                    <div class="msg-icon">👤</div>
                    <div class="msg-bubble">你好，帮我写一段代码...</div>
                </div>
                <div class="msg ai">
                    <div class="msg-icon">🤖</div>
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="msg ai">
                    <div class="msg-icon">⚠️</div>
                    <div class="msg-bubble">
                        <span class="error-msg">连接失败：NextChat 后端服务暂时无法访问，请稍后重试。</span>
                    </div>
                </div>
            </div>
            <div class="chat-footer">
                <div class="input-mock">发送消息...</div>
                <div class="send-btn">↑</div>
            </div>
        </div>
        <div class="info-bar">
            <span class="info-text">服务暂时不可用</span>
            <a href="/" class="back-link">↩ 返回主页</a>
        </div>
    </div>
</body>
</html>
