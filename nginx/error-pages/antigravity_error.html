<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity — 服务中断</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050a14;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* 动态背景粒子网格 */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orb-float 8s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; left: -50px; animation-delay: -4s; }
        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.05); }
        }
        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 520px;
            padding: 48px 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(99,102,241,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .logo span { font-weight: 300; }
        .tagline {
            font-size: 0.75rem;
            color: #6366f1;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 28px;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f1f5f9;
        }
        p {
            color: #94a3b8;
            line-height: 1.7;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .meta {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .meta-item {
            text-align: center;
        }
        .meta-label {
            font-size: 0.65rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .meta-value {
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            color: #818cf8;
            font-weight: 600;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.5);
        }
        .footer {
            margin-top: 36px;
            font-size: 0.72rem;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
        <div class="logo">anti<span>gravity</span></div>
        <div class="tagline">AI Tool Platform</div>
        <div class="status-badge">
            <div class="dot"></div>
            Service Unavailable
        </div>
        <h1>引擎暂时离线</h1>
        <p>Antigravity 工具平台后端目前无法响应。<br>服务可能正在重启或维护中，请稍候片刻再试。</p>
        <div class="meta">
            <div class="meta-item">
                <div class="meta-label">Status</div>
                <div class="meta-value">Offline</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">Error</div>
                <div class="meta-value">5xx</div>
            </div>
        </div>
        <a href="/" class="btn">↩ 返回主页</a>
        <div class="footer">— 由 虾卫士(ShrimpGuard) 安保系统监控维护 —</div>
    </div>
</body>
</html>
