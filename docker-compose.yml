services:
    Nginx:
        restart: 'unless-stopped'
        image: 'nginx'
        container_name: nginx
        ports:
            - "80:80"
            - "81:81"
            - "82:82"
            - "83:83"
            - "84:84"
            - "85:85"
            - "86:86"
            - "8080:8080"
        volumes:
            - '/home/lighthouse/workspace/WebServer/nginx/hermes-dashboard:/usr/share/nginx/hermes-dashboard:ro'
            - '/home/lighthouse/workspace/WebServer/nginx/homework:/usr/share/nginx/homework:ro'
            - '/home/lighthouse/workspace/WebServer/root:/usr/share/nginx/html:ro'
            - '/home/lighthouse/workspace/WebServer/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
            - '/home/lighthouse/workspace/WebServer/nginx/error-pages:/usr/share/nginx/error-pages:ro'
            - '/home/lighthouse/workspace/WebServer/nginx/ssl:/etc/nginx/ssl/:ro'
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - shrimp-net

    guard:
        build: ./nginx/guard
        container_name: guard
        restart: 'unless-stopped'
        volumes:
            - '/home/lighthouse/workspace/WebServer/nginx/guard/config.json:/app/config.json'
            - '/home/lighthouse/workspace/WebServer/nginx/guard/server.js:/app/server.js'
            - '/proc:/host/proc:ro'
            - '/:/hostroot:ro'
        networks:
            - shrimp-net

networks:
    shrimp-net:
        driver: bridge