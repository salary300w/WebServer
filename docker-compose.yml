version: '3'
services:
    Nginx:
        restart: 'unless-stopped'
        image: 'nginx'
        container_name: nginx
        ports:
            - 8080:80
        volumes:
            - './root:/usr/share/nginx/html:ro'
            - './nginx/auth.conf:/etc/nginx/conf.d/default.conf:ro'
            - './nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro'
        extra_hosts:
            - "host.docker.internal:host-gateway"